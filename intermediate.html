<script>
    let studentName = "";
    let answers = {};
    let currentActiveScreen = "screen-welcome";
    
    // === 倒计时相关全局变量 ===
    let timerInterval = null; 

    // === 核心配置：在此处设置每个界面的限制时间（单位：秒） ===
    const TIME_LIMITS = {
        'screen-part1': 180,  // 听力 Part 1 限时 3 分钟 (示例)
        'screen-part2': 120,  // 听力 Part 2 限时 2 分钟 (示例)
        'screen-part4': 300,  // 听力 Part 4 限时 5 分钟 (示例)
        'screen-reading': 1200, // 阅读限时 20 分钟 (示例)
        'screen-writing': 1200  // 写作限时 20 分钟 (示例)
    };

    // 用于保存所有的DOM音频引用
    const audios = {
        volume: document.getElementById('audio-volume'),
        part1: document.getElementById('audio-part1'),
        part2: document.getElementById('audio-part2'),
        part4: document.getElementById('audio-part4')
    };

    // 修改后的切换页面函数
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        currentActiveScreen = screenId;

        const mainContainer = document.getElementById('main-container');
        if (screenId === 'screen-reading' || screenId === 'screen-writing') {
            mainContainer.classList.add('wide-mode');
        } else {
            mainContainer.classList.remove('wide-mode');
        }

        // 切换页面时，启动对应的倒计时
        startScreenTimer(screenId);
    }

    // === 新增：倒计时控制逻辑 ===
    function startScreenTimer(screenId) {
        // 先清除之前的倒计时
        if (timerInterval) clearInterval(timerInterval);

        // 如果当前页面不需要限时，直接返回
        if (!TIME_LIMITS[screenId]) return;

        let timeLeft = TIME_LIMITS[screenId];

        // 动态寻找当前激活页面里的音频状态提示栏（.audio-status-indicator）或者小标题，把倒计时塞进去显示
        // 如果没有现成的提示栏，可以在界面上放一个统一的倒计时显示
        const indicator = document.querySelector(`#${screenId} .audio-status-indicator`) || 
                          document.querySelector(`#${screenId} .section-header`);
        
        let timerDisplay = document.getElementById(`timer-${screenId}`);
        if (!timerDisplay) {
            timerDisplay = document.createElement('span');
            timerDisplay.id = `timer-${screenId}`;
            timerDisplay.style.cssText = "color: #ff3b30; font-weight: bold; margin-left: 15px; float: right;";
            if (indicator) {
                indicator.appendChild(timerDisplay);
            } else {
                // 如果找不到插入点，强行插在页面最顶部
                document.getElementById(screenId).insertBefore(timerDisplay, document.getElementById(screenId).firstChild);
            }
        }

        function updateDisplay() {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            timerDisplay.innerText = `⏳ 剩余时间: ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        updateDisplay();

        timerInterval = setInterval(() => {
            timeLeft--;
            updateDisplay();

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                alert("时间到！系统将自动保存当前页面的作答并进入下一页。");
                forceNavigateNext(screenId); // 时间到，执行强制跳转
            }
        }, 1000);
    }

    // === 新增：超时强转逻辑（绕过未答题的校验） ===
    function forceNavigateNext(currentScreen) {
        if (currentScreen === 'screen-part1') {
            // 强行把当前能拿到的数据塞进 answers
            ['q11', 'q12', 'q13', 'q14', 'q15', 'q16'].forEach(q => {
                const selected = document.querySelector(`[data-question="${q}"] .option-item.selected`);
                if (selected) answers[q] = selected.getAttribute('data-value');
            });
            if (audios.part1) { audios.part1.pause(); audios.part1.currentTime = 0; }
            showScreen('screen-part2');
            if (audios.part2) audios.part2.play();

        } else if (currentScreen === 'screen-part2') {
            ['q17_18', 'q19_20'].forEach(q => {
                const opts = [];
                document.querySelectorAll(`[data-question="${q}"] .option-item.selected`).forEach(el => {
                    opts.push(el.getAttribute('data-value'));
                });
                answers[q] = opts;
            });
            if (audios.part2) { audios.part2.pause(); audios.part2.currentTime = 0; }
            showScreen('screen-part4');
            if (audios.part4) audios.part4.play();

        } else if (currentScreen === 'screen-part4') {
            ['q31', 'q32', 'q33', 'q34', 'q35', 'q36', 'q37', 'q38', 'q39', 'q40'].forEach(id => {
                answers[id] = document.getElementById(id).value.trim();
            });
            if (audios.part4) { audios.part4.pause(); audios.part4.currentTime = 0; }
            showScreen('screen-reading');

        } else if (currentScreen === 'screen-reading') {
            ['r1', 'r2', 'r3', 'r4', 'r10'].forEach(q => {
                const selected = document.querySelector(`[data-question="${q}"] .option-item.selected`);
                if (selected) answers[q] = selected.getAttribute('data-value');
            });
            ['r5', 'r6', 'r7', 'r8', 'r9'].forEach(id => {
                answers[id] = document.getElementById(id).value.trim();
            });
            showScreen('screen-writing');

        } else if (currentScreen === 'screen-writing') {
            answers["writing_essay"] = document.getElementById('writing-essay').value.trim();
            showScreen('screen-result');
        }
    }

    // 绑定多选题与单选题的选项点击事件
    document.querySelectorAll('.option-item').forEach(item => {
        item.addEventListener('click', function() {
            const block = this.closest('.question-block');
            const qId = block.getAttribute('data-question');
            const qType = block.getAttribute('data-type');
            const itemValue = this.getAttribute('data-value');

            block.classList.remove('highlight-error');

            if (qType === 'single') {
                block.querySelectorAll('.option-item').forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
                answers[qId] = itemValue;
            } else if (qType === 'multi') {
                const limit = parseInt(block.getAttribute('data-limit') || '2');
                if (!answers[qId]) answers[qId] = [];

                if (this.classList.contains('selected')) {
                    this.classList.remove('selected');
                    answers[qId] = answers[qId].filter(v => v !== itemValue);
                } else {
                    if (answers[qId].length >= limit) {
                        alert(`该题最多只能选择 ${limit} 个选项！`);
                        return;
                    }
                    this.classList.add('selected');
                    answers[qId].push(itemValue);
                }
            }
        });
    });

    // 绑定填空题输入框清除报错边框
    document.querySelectorAll('.fill-blank-input').forEach(input => {
        input.addEventListener('input', function() {
            if (this.value.trim() !== "") {
                this.classList.remove('highlight-error');
            }
        });
    });

    // 绑定写作输入框清除报错边框
    const writingArea = document.getElementById('writing-essay');
    if (writingArea) {
        writingArea.addEventListener('input', function() {
            if (this.value.trim() !== "") {
                this.classList.remove('highlight-error');
            }
            updateWordCount();
        });

        // === 新增：防作弊逻辑，全面禁止复制、粘贴、剪切 ===
        ['paste', 'copy', 'cut'].forEach(eventName => {
            writingArea.addEventListener(eventName, function(e) {
                e.preventDefault();
                alert("为了考试公平，作文输入框已禁用复制、剪切和粘贴功能！");
            });
        });
    }

    function validateAndNavigate() {
        const nameInput = document.getElementById('participant-name');
        const errorMsg = document.getElementById('name-error');
        studentName = nameInput.value.trim();

        if (studentName === "") {
            errorMsg.style.display = 'block';
            nameInput.style.focus;
            return;
        }
        errorMsg.style.display = 'none';
        
        showScreen('screen-volume');
        
        if (audios.volume) {
            audios.volume.play().catch(err => {
                console.log("Audio play deferred or blocked:", err);
            });
        }
    }

    function startPart1() {
        if (audios.volume) {
            audios.volume.pause();
            audios.volume.currentTime = 0;
        }
        showScreen('screen-part1');
        if (audios.part1) audios.part1.play();
    }

    function goToPart2() {
        let part1Questions = ['q11', 'q12', 'q13', 'q14', 'q15', 'q16'];
        let missing = [];
        
        part1Questions.forEach(q => {
            if (!answers[q]) {
                missing.push(q);
                document.querySelector(`[data-question="${q}"]`).classList.add('highlight-error');
            }
        });

        if (missing.length > 0) {
            document.getElementById('wrapper-part1').scrollTop = 0;
            alert("请回答完当前屏幕上的所有问题，然后再进入下一页！");
            return;
        }

        if (audios.part1) {
            audios.part1.pause();
            audios.part1.currentTime = 0;
        }
        showScreen('screen-part2');
        if (audios.part2) audios.part2.play();
    }

    function goToPart4() {
        let part2Questions = ['q17_18', 'q19_20'];
        let missing = [];

        part2Questions.forEach(q => {
            if (!answers[q] || answers[q].length < 2) {
                missing.push(q);
                document.querySelector(`[data-question="${q}"]`).classList.add('highlight-error');
            }
        });

        if (missing.length > 0) {
            document.getElementById('wrapper-part2').scrollTop = 0;
            alert("请完成当前屏幕上的所有多项选择题（每题选择2项），然后再进入下一页！");
            return;
        }

        if (audios.part2) {
            audios.part2.pause();
            audios.part2.currentTime = 0;
        }
        showScreen('screen-part4');
        if (audios.part4) audios.part4.play();
    }

    function goToReading() {
        let part4Ids = ['q31', 'q32', 'q33', 'q34', 'q35', 'q36', 'q37', 'q38', 'q39', 'q40'];
        let unfilledCount = 0;

        part4Ids.forEach(id => {
            const val = document.getElementById(id).value.trim();
            if (val === "") {
                unfilledCount++;
                document.getElementById(id).classList.add('highlight-error');
            } else {
                answers[id] = val;
            }
        });

        if (unfilledCount > 0) {
            alert("请填写完当前表格中的所有单词填空，然后再进入下一页！");
            return;
        }

        if (audios.part4) {
            audios.part4.pause();
            audios.part4.currentTime = 0;
        }
        showScreen('screen-reading');
    }

    function goToWriting() {
        let readChoices = ['r1', 'r2', 'r3', 'r4', 'r10'];
        let missing = false;

        readChoices.forEach(q => {
            if (!answers[q]) {
                missing = true;
                document.querySelector(`[data-question="${q}"]`).classList.add('highlight-error');
            }
        });

        let readBlanks = ['r5', 'r6', 'r7', 'r8', 'r9'];
        let blankBlockError = false;

        readBlanks.forEach(id => {
            const val = document.getElementById(id).value.trim();
            if (val === "") {
                missing = true;
                blankBlockError = true;
                document.getElementById(id).classList.add('highlight-error');
            } else {
                answers[id] = val;
            }
        });

        if (blankBlockError) {
            document.getElementById('reading-blanks-block').classList.add('highlight-error');
        } else {
            document.getElementById('reading-blanks-block').classList.remove('highlight-error');
        }

        if (missing) {
            document.getElementById('wrapper-reading').scrollTop = 0;
            alert("请完成当前屏幕上的所有阅读题目（含选择题与填空），然后再进入下一页！");
            return;
        }

        showScreen('screen-writing');
    }

    function updateWordCount() {
        const text = document.getElementById('writing-essay').value.trim();
        if (text === "") {
            document.getElementById('word-count-val').innerText = "0";
            return;
        }
        const words = text.split(/\s+/);
        document.getElementById('word-count-val').innerText = words.length;
    }

    function submitTest() {
        const essayText = document.getElementById('writing-essay').value.trim();
        if (essayText === "") {
            document.getElementById('writing-essay').classList.add('highlight-error');
            alert("请在右侧文本框内撰写您的作文，完成后再点击提交！");
            return;
        }
        answers["writing_essay"] = essayText;
        
        // 结束时清除全局定时器
        if (timerInterval) clearInterval(timerInterval);
        
        showScreen('screen-result');
    }

    function downloadDataFile() {
        const timestamp = new Date().toISOString().replace(/[:.]/g, "-");
        const filename = `IELTS_Report_${studentName}_${timestamp}.txt`;

        let fileContent = `==================================================\n`;
        fileContent += `   SDUFE IELTS PLACEMENT TEST REPORT (INTERMEDIATE)\n`;
        fileContent += `==================================================\n`;
        fileContent += `Participant Name : ${studentName}\n`;
        fileContent += `Submission Time  : ${new Date().toLocaleString()}\n`;
        fileContent += `--------------------------------------------------\n\n`;

        fileContent += `[LISTENING SECTION ANSWERS]\n`;
        fileContent += `Q11 : ${answers['q11'] || ''}\n`;
        fileContent += `Q12 : ${answers['q12'] || ''}\n`;
        fileContent += `Q13 : ${answers['q13'] || ''}\n`;
        fileContent += `Q14 : ${answers['q14'] || ''}\n`;
        fileContent += `Q15 : ${answers['q15'] || ''}\n`;
        fileContent += `Q16 : ${answers['q16'] || ''}\n`;
        fileContent += `Q17-18 : ${(answers['q17_18'] || []).join(', ')}\n`;
        fileContent += `Q19-20 : ${(answers['q19_20'] || []).join(', ')}\n`;
        for(let i=31; i<=40; i++) {
            fileContent += `Q${i} : ${answers['q'+i] || ''}\n`;
        }
        fileContent += `\n`;

        fileContent += `[READING SECTION ANSWERS]\n`;
        for(let i=1; i<=9; i++) {
            fileContent += `Q${i} : ${answers['r'+i] || ''}\n`;
        }
        fileContent += `Q10 : ${answers['r10'] || ''}\n`;
        fileContent += `\n`;

        fileContent += `[WRITING SECTION ESSAY]\n`;
        fileContent += `${answers['writing_essay'] || ''}\n\n`;
        fileContent += `==================================================\n`;
        fileContent += `                 END OF REPORT                    \n`;
        fileContent += `==================================================\n`;

        const blob = new Blob([fileContent], { type: 'text/plain;charset=utf-8' });
        const element = document.createElement('a');
        element.href = URL.createObjectURL(blob);
        element.download = filename;
        document.body.appendChild(element);
        element.click();
        document.body.removeChild(element);
    }
</script>
